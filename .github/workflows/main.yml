name: Personal Emacs Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install autoconf automake texinfo libxml2 libxpm \
          libjpeg librsvg libgccjit jansson librewolf

      - name: Build Emacs
        run: |
          ./autogen.sh
          ./configure --with-native-compilation
          make

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: nextstep/Emacs.app
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
